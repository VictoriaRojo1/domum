version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: domum_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: domum
      POSTGRES_PASSWORD: domum123
      POSTGRES_DB: domum
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
